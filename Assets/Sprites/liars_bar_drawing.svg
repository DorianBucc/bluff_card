    <text x="220" y="280" font-size="48" font-weight="700" fill="url(#neon-red)" text-anchor="middle" letter-spacing="3" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:48px;font-weight:700;text-anchor:middle;dominant-baseline:auto">BAR</text>
    
    <!-- Reflet du néon -->
    <rect x="80" y="140" width="280" height="160" fill="#ff3333" opacity="0.1" rx="8" style="fill:rgb(255, 51, 51);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
